<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NLPL IT Support — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">💻</div>
      <h1>NLPL IT Support</h1>
      <p>Internal Task Management System</p>
    </div>

    <div class="login-error" id="loginError"></div>

    <div class="form-group">
      <label class="form-label" for="userId">User ID</label>
      <input
        class="form-control"
        type="text"
        id="userId"
        placeholder="Enter your User ID"
        autocomplete="username"
        autofocus
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div style="position:relative">
        <input
          class="form-control"
          type="password"
          id="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
        <button
          type="button"
          id="togglePwd"
          style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-muted)"
          title="Show/hide password"
        >👁️</button>
      </div>
    </div>

    <button class="btn btn-primary" id="loginBtn">
      🔐 Sign In
    </button>

    <div class="login-hint">
      <strong>Credentials</strong><br />
      Admin: <strong>admin</strong> / <strong>Nava@123</strong><br />
      Staff: <strong>NM4901</strong> / <strong>Nava@123</strong><br />
      Staff: <strong>NL13078</strong> / <strong>Nava@123</strong><br />
      Staff: <strong>NM1234</strong> / <strong>Nava@123</strong>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    Auth.requireGuest();

    const loginBtn  = document.getElementById('loginBtn');
    const userIdEl  = document.getElementById('userId');
    const passwordEl = document.getElementById('password');
    const loginError = document.getElementById('loginError');
    const togglePwd  = document.getElementById('togglePwd');

    togglePwd.addEventListener('click', () => {
      const isText = passwordEl.type === 'text';
      passwordEl.type = isText ? 'password' : 'text';
      togglePwd.textContent = isText ? '👁️' : '🙈';
    });

    async function doLogin() {
      const userId   = userIdEl.value.trim();
      const password = passwordEl.value;

      if (!userId || !password) {
        showError('Please enter both User ID and Password.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = '⏳ Signing in...';

      const result = await Auth.login(userId, password);
      if (result.success) {
        window.location.href = 'dashboard.html';
      } else {
        showError(result.message);
        loginBtn.disabled = false;
        loginBtn.textContent = '🔐 Sign In';
        passwordEl.value = '';
        passwordEl.focus();
      }
    }

    loginBtn.addEventListener('click', doLogin);
    [userIdEl, passwordEl].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });

    function showError(msg) {
      loginError.textContent = msg;
      loginError.classList.add('show');
      setTimeout(() => loginError.classList.remove('show'), 4000);
    }
  </script>
</body>
</html>
